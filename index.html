<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Focus Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .hidden { display: none !important; }
        .option-btn:disabled { cursor: not-allowed; }
        .correct-answer { background-color: #22c55e !important; color: white !important; border-color: #22c55e !important; }
        .wrong-answer { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-800">

    <div id="app" class="w-full max-w-2xl bg-white rounded-xl shadow-lg overflow-hidden m-4 border border-slate-200">
        
        <div class="bg-green-800 text-white p-6 text-center">
            <h1 class="text-2xl font-bold tracking-wide">OYAK HORSE</h1>
            <p id="header-subtitle" class="text-slate-400 mt-1 uppercase text-sm font-semibold tracking-widest">Green Focus Test</p>
        </div>

        <div class="p-8">
            <div id="screen-login">
                <div class="mb-5">
                    <label class="block text-sm font-bold text-slate-700 mb-2" for="user-name">Ad Soyad</label>
                    <input type="text" id="user-name" class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-slate-500 transition-all" placeholder="Tam adınızı giriniz">
                </div>
                <div class="mb-8">
                    <label class="block text-sm font-bold text-slate-700 mb-2" for="user-dept">Departman</label>
                    <select id="user-dept" class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-slate-500 transition-all bg-white">
                        <option value="">Seçim Yapınız</option>
                        <option value="HSE">İş Sağlığı Güvenliği ve Çevre</option>
                        <option value="Dökümhane">Dökümhane</option>
                        <option value="Motor">Motor</option>
                        <option value="Bakım">Bakım</option>
                        <option value="Vites Kutusu">Vites Kutusu</option>
                        <option value="Lojistik">Lojistik</option>
                        <option value="Kalite">Kalite</option>
                        <option value="Ar-Ge">Ar-Ge</option>
                    </select>
                </div>
                <div id="login-error" class="text-red-600 text-sm mb-6 hidden font-medium">Lütfen tüm alanları doldurunuz.</div>
                <div class="space-y-3">
                    <button onclick="startQuiz()" class="w-full bg-green-800 text-white font-bold py-4 rounded-lg hover:bg-slate-800 transition-colors shadow-md">Teste Başla</button>
                    <button onclick="showStats()" class="w-full bg-slate-100 text-slate-700 font-bold py-4 rounded-lg hover:bg-slate-200">İstatistikler</button>
                </div>
            </div>

            <div id="screen-quiz" class="hidden">
                <div class="flex justify-between items-center mb-4 text-xs font-bold text-slate-400 uppercase">
                    <span id="question-counter"></span>
                    <span id="score-display"></span>
                </div>
                <div class="w-full bg-slate-100 h-2 mb-8 rounded-full">
                    <div id="progress-bar" class="bg-slate-900 h-2 rounded-full transition-all duration-500"></div>
                </div>
                <div class="mb-8 flex justify-center bg-slate-50 rounded-xl border border-slate-100 overflow-hidden">
                    <img id="question-image" src="" alt="Atık" class="max-h-72 object-contain hidden p-4">
                </div>
                <h2 id="question-text" class="text-xl font-bold mb-8 text-center text-slate-800 leading-tight"></h2>
                <div id="options-container" class="grid grid-cols-1 gap-3"></div>
                <div class="mt-10 flex justify-center">
                    <button id="next-btn" onclick="nextQuestion()" class="hidden bg-slate-900 text-white font-bold py-3 px-10 rounded-full hover:bg-slate-800 shadow-lg">İleri</button>
                </div>
            </div>

            <div id="screen-result" class="hidden text-center py-6">
                <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Test Tamamlandı</h2>
                <div class="text-6xl font-black text-slate-900 my-8" id="final-score"></div>
                <p id="result-message" class="mb-10 text-slate-600 font-medium"></p>
                <div class="flex flex-col gap-3">
                    <button onclick="showStats()" class="bg-slate-900 text-white font-bold py-4 rounded-lg">Verileri Görüntüle</button>
                    <button onclick="appReset()" class="bg-slate-100 text-slate-700 font-bold py-4 rounded-lg">Yeni Katılımcı</button>
                </div>
            </div>

            <div id="screen-stats" class="hidden">
                <div class="flex items-center justify-between mb-4 border-b pb-4">
                    <h2 class="text-2xl font-black">İstatistikler</h2>
                    <button onclick="appReset()" class="text-slate-400 font-bold">Kapat</button>
                </div>
                <p id="loading-text" class="text-sm text-slate-500 mb-4 hidden">Veriler sunucudan çekiliyor...</p>
                <div class="flex gap-2 mb-6">
                    <select id="filter-month" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500 bg-white" onchange="renderStatsTable()">
                        <option value="">Tüm Aylar</option>
                    </select>
                    <select id="filter-dept" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500 bg-white" onchange="renderStatsTable()">
                        <option value="">Tüm Departmanlar</option>
                        <option value="HSE">İş Sağlığı Güvenliği ve Çevre</option>
                        <option value="Dökümhane">Dökümhane</option>
                        <option value="Motor">Motor</option>
                        <option value="Bakım">Bakım</option>
                        <option value="Vites Kutusu">Vites Kutusu</option>
                        <option value="Lojistik">Lojistik</option>
                        <option value="Kalite">Kalite</option>
                        <option value="Ar-Ge">Ar-Ge</option>
                    </select>
                </div>
                <div class="bg-slate-50 rounded-xl p-2 mb-10">
                    <table class="w-full text-sm">
                        <thead><tr class="text-slate-500 text-left"><th class="p-3">Birim</th><th class="p-3">Katılımcı</th><th class="p-3 text-right">Ort</th></tr></thead>
                        <tbody id="dept-stats-body"></tbody>
                    </table>
                </div>
                <div class="bg-slate-50 rounded-xl p-2 max-h-64 overflow-y-auto">
                    <table class="w-full text-sm">
                        <thead><tr class="text-slate-500 text-left"><th class="p-3">İsim</th><th class="p-3">Birim</th><th class="p-3 text-right">Skor</th><th class="p-3 text-right">Tarih</th></tr></thead>
                        <tbody id="user-stats-body"></tbody>
                    </table>
                </div>
                <div class="mt-8 flex flex-col gap-3">
                    <button onclick="exportData()" class="bg-emerald-700 text-white font-bold py-4 rounded-lg shadow-md">CSV İndir</button>
                    <button onclick="clearAllData()" class="text-red-500 text-xs py-2">Sıfırla</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxtSV5O5wNwUVGwbZazdxHEAsIaiVRjNw6I_n9J7p2lz6sI8anxr8p3HulJWh96d8bf/exec";
        const soruHavuzu = [
            { question: "Görseldeki Tehlikeli Atık kabına aşağıdakilerden hangisi ATILMAZ? / Which of the following CANNOT be thrown into the Hazardous Waste bin in the image?", options: ["Kirlenmiş absorban / Contaminated absorbents", "Kontamine eldiven / Contaminated glove", "Temiz karton kutu / Clean cardboard box", "Yağlı Bez / Oily Cloth"], correctAnswer: 2, image: "kutu-tehlikeli.jpg" },
            { question: "Aşağıdaki atıklardan hangisi Evsel Atık kutusuna atılmaya uygundur? / Which of the following wastes is suitable for the Domestic Waste bin?", options: ["Yağlı üstüpü / Oily cotton waste", "Islanmış peçete / Wet tissue", "Alüminyum içecek kutusu / Aluminum beverage can", "Bitmiş pil / Dead battery"], correctAnswer: 1, image: "kutu-evsel.jpg" },
            { question: "Dönüşümlü Ambalaj kabına aşağıdakilerden hangisi atılmamalıdır? / Which of the following should not be thrown into the Recyclable Packaging bin?", options: ["Temiz poşet / Clean plastic bag", "Yağlı absorban ped / Oily absorbent pad", "Metal içecek kutusu / Metal beverage can", "Pet şişe / PET bottle"], correctAnswer: 1, image: "kutu-ambalaj.jpg" },
            { question: "Kullanılmış atık eldivenler hangi üniteye atılmalıdır? / Which unit should used waste gloves be thrown into?", options: ["Tehlikeli Atık Kabı / Hazardous Waste Bin", "Evsel Atık Kabı / Domestic Waste Bin", "Plastik Atık Kabı / Plastic Waste Bin", "Naylon Atık Kabı / Nylon Waste Bin"], correctAnswer: 0, image: "maske-eldiven.jpg" },
            { question: "Tehlikeli madde taşıyan boş bidonlar nereye atılmalıdır? / Where should empty jerrycans that contained hazardous materials be thrown?", options: ["Plastik Atık Kabı / Plastic Waste Bin", "Tehlikeli Atık Kabı / Hazardous Waste Bin", "Evsel Atık Kabı / Domestic Waste Bin", "Absorban Kabı / Absorbent Bin"], correctAnswer: 1, image: "kimyasal-bidon.jpg" },
            { question: "Yağ sızıntısı temizliğinde kullanılan absorbanlar hangi kutuya atılır? / Which bin are absorbents used in oil leak cleanup thrown into?", options: ["Evsel Atık Kabı / Domestic Waste Bin", "Tehlikeli Atık Kabı / Hazardous Waste Bin", "Absorban Kabı / Absorbent Bin", "Plastik Atık Kabı / Plastic Waste Bin"], correctAnswer: 1, image: "yagli-ped.jpg" },
            { question: "Birimlerden çıkan bu sert plastik şerit çemberler nereye atılmalıdır? / Where should these hard plastic strapping bands from the units be thrown?", options: ["Naylon Atık Kabı / Nylon Waste Bin", "Plastik Atık Kabı / Plastic Waste Bin", "Karton Atık Kabı / Cardboard Waste Bin", "Tehlikeli Atık Kabı / Hazardous Waste Bin"], correctAnswer: 1, image: "plastik-cember.jpg" },
            { question: "Bilgisayar ekipmanlarının hangi atık kabına atılması uygundur? / Which waste bin is suitable for computer equipment?", options: ["Plastik Atık Kabı / Plastic Waste Bin", "Evsel Atık Kabı / Domestic Waste Bin", "Elektronik Atık Kabı / Electronic Waste Bin", "Tehlikeli Atık Kabı / Hazardous Waste Bin"], correctAnswer: 2, image: "elektronik-atik.jpg" },
            { question: "Atölyelerden çıkan ürün paketlemelerinde kullanılan bu temiz poşetler nereye atılır? / Where are these clean bags used in product packaging from workshops thrown?", options: ["Naylon Atık Kabı / Nylon Waste Bin", "Plastik Atık Kabı / Plastic Waste Bin", "Evsel Atık Kabı / Domestic Waste Bin", "Tehlikeli Atık Kabı / Hazardous Waste Bin"], correctAnswer: 0, image: "temiz-naylon.jpg" },
            { question: "Tesis içinde bulunan atık piller hangi kutuya atılmalıdır? / Which bin should the waste batteries found in the facility be thrown into?", options: ["Atık Pil Kutusu / Waste Battery Box", "Tehlikeli Atık Kabı / Hazardous Waste Bin", "Evsel Atık Kabı / Domestic Waste Bin", "Naylon Atık Kabı / Nylon Waste Bin"], correctAnswer: 0, image: "atik-pil.jpg" },
            { question: "Kirlenmiş bardaklar nereye atılmalıdır? / Where should dirty cups be thrown?", options: ["Kağıt Atık Kabı / Paper Waste Bin", "Plastik Atık Kabı / Plastic Waste Bin", "Evsel Atık Kabı / Domestic Waste Bin", "Tehlikeli Atık Kabı / Hazardous Waste Bin"], correctAnswer: 2, image: "kirli-bardak.jpg" },
            { question: "Sevkiyat sonrası çıkan temiz karton kolileri nereye atılır? / Where are clean cardboard boxes from post-shipment thrown?", options: ["Atık Pil Kutusu / Waste Battery Box", "Kağıt Atık Kabı / Paper Waste Bin", "Karton Atık Kabı / Cardboard Waste Bin", "Tehlikeli Atık Kabı / Hazardous Waste Bin"], correctAnswer: 2, image: "atik-karton.jpg" },
            { question: "Parça paketlemede kullanılan şeffaf filmler/Shrink nereye atılır? / Where are transparent films/shrinks used in part packaging thrown?", options: ["Plastik Atık Kabı / Plastic Waste Bin", "Naylon Atık Kabı / Nylon Waste Bin", "Evsel Atık Kabı / Domestic Waste Bin", "Karton Atık Kabı / Cardboard Waste Bin"], correctAnswer: 1, image: "shrink plastic.png" },
            { question: "Üretim hatalı sert plastik parçalar nereye atılmalıdır? / Where should production-defective hard plastic parts be thrown?", options: ["Geri Dönüşümlü Ambalaj Kabı / Recyclable Packaging Bin", "Naylon Atık Kabı / Nylon Waste Bin", "Evsel Atık Kabı / Domestic Waste Bin", "Plastik Atık Kabı / Plastic Waste Bin"], correctAnswer: 3, image: "Plastic-parts-1024x596.png" },
            { question: "Cam şişeler hangi üniteye atılmalıdır? / Which unit should glass bottles be thrown into?", options: ["Geri Dönüşümlü Ambalaj Kabı / Recyclable Packaging Bin", "Kağıt Atık Kabı / Paper Waste Bin", "Tehlikeli Atık Kabı / Hazardous Waste Bin", "Plastik Atık Kabı / Plastic Waste Bin"], correctAnswer: 0, image: "cam-sise.jpg" },
            { question: "Nem tutucular hangi atık kabına atılmalıdır / Which waste bin should desiccants be thrown into?", options: ["Tehlikeli Atık Kabı / Hazardous Waste Bin", "Naylon Atık Kabı / Nylon Waste Bin", "Kağıt Atık Kabı / Paper Waste Bin", "Evsel Atık Kabı / Domestic Waste Bin"], correctAnswer: 3, image: "nem-tutucu.jpg" },
            { question: "Zemine dökülen yağların temizliğinde kullanılan absorban nereye atılır? / Where is the absorbent used for cleaning oil spilled on the floor thrown?", options: ["Absorban Kabı / Absorbent Bin", "Tehlikeli Atık Kabı / Hazardous Waste Bin", "Evsel Atık Kabı / Domestic Waste Bin", "Plastik Atık Kabı / Plastic Waste Bin"], correctAnswer: 0, image: "absorban-granul.jpg" },
            { question: "Atölyelerde kullanılan kirlenmiş absorbanların atılacağı ünite hangisidir? / Which is the unit where contaminated absorbents used in workshops will be thrown?", options: ["Evsel Atık Kabı / Domestic Waste Bin", "Absorban Kabı / Absorbent Bin", "Tehlikeli Atık Kabı / Hazardous Waste Bin", "Naylon Atık Kabı / Nylon Waste Bin"], correctAnswer: 2, image: "kirli-ustupu.jpg" },
            { question: "Ofislerden/Atölyelerden çıkan kullanılmayan kağıtlar nereye atılmalıdır? / Where should unused paper from offices/workshops be thrown?", options: ["Dönüşümlü Ambalaj Kabı / Recyclable Packaging Bin", "Kağıt Atık Kabı / Paper Waste Bin", "Evsel Atık Kabı / Domestic Waste Bin", "Tehlikeli Atık Kabı / Hazardous Waste Bin"], correctAnswer: 1, image: "kagit-atik.jpg" },
            { question: "Görseldeki Tehlikeli Atık kabına aşağıdakilerden hangisi atılmalıdır? / Which of the following should be thrown into the Hazardous Waste bin in the image?", options: ["Yağlı eldiven / Oily glove", "Yemek artığı / Food waste", "Pet şişe / PET bottle", "Temiz gazete / Clean newspaper"], correctAnswer: 0, image: "kutu-tehlikeli.jpg" },
            { question: "Görseldeki Kağıt Atık kutusuna hangisinin atılması doğrudur? / Which is correct to throw into the Paper Waste bin in the image?", options: ["Şeffaf dosya / Transparent folder", "Yağlı pizza kutusu / Oily pizza box", "Fotokopi kağıdı / Copy paper", "Plastik dosya / Plastic folder"], correctAnswer: 2, image: "kutu-kagit.jpg" },
            { question: "Absorban kabı ünitesine aşağıdakilerden hangisi atılabilir? / Which of the following can be thrown into the Absorbent bin unit?", options: ["Temiz absorbanlar / Clean absorbents", "Temiz streç film / Clean stretch film", "Kirlenmiş absorbanlar / Contaminated absorbents", "Atık pil / Waste battery"], correctAnswer: 0, image: "kutu-absorban.jpg" },
            { question: "Plastik atık kutusuna hangisinin atılması yanlıştır? / Which is wrong to throw into the Plastic waste bin?", options: ["Sert plastik parça / Hard plastic part", "Plastik çember / Plastic hoop", "Yağlı plastik bidon / Oily plastic jerrycan", "Temiz plastik kapak / Clean plastic cap"], correctAnswer: 2, image: "kutu-plastik.jpg" },
            { question: "Aşağıdakilerden hangisi Karton Atık kabına atılmalıdır? / Which of the following should be thrown into the Cardboard Waste bin?", options: ["Yağlı yemek paketi / Oily food package", "Temiz sevkiyat kolisi / Clean shipping box", "Plastik şerit / Plastic strip", "Kırık floresan / Broken fluorescent"], correctAnswer: 1, image: "kutu-karton.jpg" },
            { question: "Naylon atık kutusuna hangisinin atılması uygundur? / Which is suitable to throw into the Nylon waste bin?", options: ["Yağlı naylon / Oily nylon", "Karton koli / Cardboard box", "Temiz poşet naylon / Clean plastic bag", "Metal talaş / Metal swarf"], correctAnswer: 2, image: "kutu-naylon.jpg" },
            { question: "Atık pil kutusu ünitesine aşağıdakilerden hangisinin atılması yanlıştır? / Which of the following is wrong to throw into the Waste battery box unit?", options: ["Kalem pil / AA-AAA battery", "Lityum batarya / Lithium battery", "Metal kutu / Metal can", "Düğme pil / Button cell"], correctAnswer: 2, image: "kutu-pil.jpg" },
            { question: "Görseldeki Dönüşümlü Ambalaj kabına hangisi atılabilir? / Which can be thrown into the Recyclable Packaging bin in the image?", options: ["Yağlı bez / Oily cloth", "Temiz plastik şişe / Clean plastic bottle", "Yemek artığı / Food waste", "Asitli sıvı / Acidic liquid"], correctAnswer: 1, image: "kutu-ambalaj.jpg" },
            { question: "Aşağıdakilerden hangisi Tehlikeli Atık ünitesine atılmaz? / Which of the following is not thrown into the Hazardous Waste unit?", options: ["Boş aerosol kutusu / Empty aerosol can", "Kirli filtre / Dirty filter", "Kontamine bez / Contaminated cloth", "Temiz boş koli / Clean empty box"], correctAnswer: 3, image: "kutu-tehlikeli.jpg" },
            { question: "Evsel Atık ünitesine hangisinin atılması doğrudur? / Which is correct to throw into the Domestic Waste unit?", options: ["Elektronik Kablo / Electronic Cable", "Islak mendil / Wet wipe", "Yağlı talaş / Oily swarf", "Floresan lamba / Fluorescent lamp"], correctAnswer: 1, image: "kutu-evsel.jpg" },
            { question: "Görseldeki Kağıt Atık kutusuna aşağıdakilerden hangisinin atılması uygun değildir? / Which of the following is not suitable to throw into the Paper Waste bin in the image?", options: ["Takvim / Calendar", "Gazete / Newspaper", "Yağlı yemek kutusu / Oily food box", "Not kağıdı / Note paper"], correctAnswer: 2, image: "kutu-kagit.jpg" },
            { question: "Plastik atık ünitesine aşağıdakilerden hangisinin atılması uygundur? / Which of the following is suitable to throw into the Plastic waste unit?", options: ["Plastik ambalaj / Plastic packaging", "Yağlı bidon / Oily jerrycan", "Karton koli / Cardboard box", "Cam bardak / Glass cup"], correctAnswer: 0, image: "kutu-plastik.jpg" },
            { question: "Naylon atık ünitesine hangisinin atılması yanlıştır? / Which is wrong to throw into the Nylon waste unit?", options: ["Balonlu naylon / Bubble wrap", "Temiz shrink / Clean shrink wrap", "Yağlanmış poşet / Oiled plastic bag", "Temiz sevkiyat naylonu / Clean shipping nylon"], correctAnswer: 2, image: "kutu-naylon.jpg" },
            { question: "Tehlikeli Atık kabına hangisi atılmalıdır? / Which should be thrown into the Hazardous Waste bin?", options: ["Gıda artığı / Food waste", "Yağlı emici ped / Oily absorbent pad", "Meyve kabuğu / Fruit peel", "Temiz karton / Clean cardboard"], correctAnswer: 1, image: "kutu-tehlikeli.jpg" },
            { question: "Aşağıdaki eşleşmelerden hangisi YANLIŞTIR? / Which of the following matches is WRONG?", options: ["Bitmiş kutu kola - Geri Dönüşümlü Ambalaj Kabı / Empty cola can - Recyclable Packaging Bin", "Peçete - Evsel Atık Kabı / Tissue - Domestic Waste Bin", "Streç - Naylon Atık Kabı / Stretch film - Nylon Waste Bin", "Pil - Tehlikeli Atık Kabı / Battery - Hazardous Waste Bin"], correctAnswer: 3, image: "geri-donusum.jpg" }
        ];

        let state = { currentUser: "", currentDept: "", index: 0, score: 0, currentSet: [], records: [] };

        function showScreen(id) {
            ['screen-login', 'screen-quiz', 'screen-result', 'screen-stats'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function startQuiz() {
            const name = document.getElementById('user-name').value.trim();
            const dept = document.getElementById('user-dept').value;
            if (!name || !dept) { document.getElementById('login-error').classList.remove('hidden'); return; }
            state.currentUser = name; state.currentDept = dept; state.index = 0; state.score = 0;
            state.currentSet = [...soruHavuzu].sort(() => Math.random() - 0.5).slice(0, 8);
            showScreen('screen-quiz'); renderQuestion();
        }

        function renderQuestion() {
            const q = state.currentSet[state.index];
            document.getElementById('question-counter').innerText = `Soru: ${state.index + 1} / ${state.currentSet.length}`;
            document.getElementById('score-display').innerText = `Puan: ${state.score}`;
            document.getElementById('progress-bar').style.width = `${((state.index + 1) / state.currentSet.length) * 100}%`;
            const img = document.getElementById('question-image');
            img.src = q.image; img.classList.remove('hidden');
            document.getElementById('question-text').innerText = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = ''; document.getElementById('next-btn').classList.add('hidden');
            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn w-full text-left p-5 border rounded-xl font-bold text-slate-700 shadow-sm transition-all hover:bg-slate-50';
                b.innerText = opt; b.onclick = () => handleSelection(i, b);
                container.appendChild(b);
            });
        }

        function handleSelection(idx, btn) {
            const q = state.currentSet[state.index];
            const correct = idx === q.correctAnswer;
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach((b, i) => {
                b.disabled = true;
                if (i === q.correctAnswer) b.classList.add('correct-answer');
                else if (i === idx && !correct) b.classList.add('wrong-answer');
            });
            if (correct) state.score++;
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            state.index++;
            if (state.index < state.currentSet.length) renderQuestion();
            else finish();
        }

        async function finish() {
            const record = { name: state.currentUser, dept: state.currentDept, score: state.score, date: new Date().toLocaleDateString('tr-TR') };
            state.records.push(record); 
            document.getElementById('final-score').innerText = `${state.score} / ${state.currentSet.length}`;
            document.getElementById('result-message').innerText = state.score >= 6 ? "Yüksek farkındalık seviyesi." : "Atık yönetim planını tekrar inceleyiniz.";
            showScreen('screen-result');

            try {
                await fetch(API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(record)
                });
            } catch (error) {
                console.error(error);
            }
        }

        async function showStats() {
            const pin = prompt("Şifre:");
            if (pin === "1510") {
                showScreen('screen-stats');
                document.getElementById('loading-text').classList.remove('hidden');
                try {
                    const response = await fetch(API_URL);
                    state.records = await response.json();
                } catch (error) {
                    console.error(error);
                }
                document.getElementById('loading-text').classList.add('hidden');
                updateMonthDropdown();
                renderStatsTable();
            } else { 
                alert("Hatalı."); 
            }
        }

        function updateMonthDropdown() {
            const monthSelect = document.getElementById('filter-month');
            const currentVal = monthSelect.value;
            const months = new Set();
            state.records.forEach(r => {
                if (r.date) {
                    const d = String(r.date).split('.');
                    if (d.length === 3) months.add(`${d[1]}.${d[2]}`);
                    else {
                        const d2 = String(r.date).split('/');
                        if (d2.length === 3) months.add(`${d2[1]}/${d2[2]}`);
                    }
                }
            });
            monthSelect.innerHTML = '<option value="">Tüm Aylar</option>';
            Array.from(months).sort().forEach(m => {
                monthSelect.innerHTML += `<option value="${m}">${m}</option>`;
            });
            monthSelect.value = currentVal;
        }

        function renderStatsTable() {
            const fMonth = document.getElementById('filter-month').value;
            const fDept = document.getElementById('filter-dept').value;

            let filtered = state.records;
            if (fMonth) {
                filtered = filtered.filter(r => r.date && (String(r.date).includes(`.${fMonth}`) || String(r.date).includes(`/${fMonth}`)));
            }
            if (fDept) {
                filtered = filtered.filter(r => r.dept === fDept);
            }

            const deptMap = {};
            filtered.forEach(r => {
                if (!deptMap[r.dept]) deptMap[r.dept] = { sum: 0, count: 0 };
                deptMap[r.dept].sum += Number(r.score); deptMap[r.dept].count++;
            });

            const dBody = document.getElementById('dept-stats-body'); dBody.innerHTML = '';
            Object.keys(deptMap).forEach(d => {
                const avg = (deptMap[d].sum / deptMap[d].count).toFixed(1);
                dBody.innerHTML += `<tr><td class="p-3 border-b text-slate-800 font-semibold">${d}</td><td class="p-3 border-b">${deptMap[d].count}</td><td class="p-3 border-b text-right font-bold">${avg}</td></tr>`;
            });

            const uBody = document.getElementById('user-stats-body'); uBody.innerHTML = '';
            [...filtered].reverse().slice(0, 20).forEach(r => {
                uBody.innerHTML += `<tr><td class="p-3 border-b">${r.name}</td><td class="p-3 border-b text-xs">${r.dept}</td><td class="p-3 border-b text-right font-bold">${r.score}</td><td class="p-3 border-b text-xs text-right text-slate-500">${r.date || '-'}</td></tr>`;
            });
        }

        function exportData() {
            const fMonth = document.getElementById('filter-month').value;
            const fDept = document.getElementById('filter-dept').value;
            let filtered = state.records;
            if (fMonth) filtered = filtered.filter(r => r.date && (String(r.date).includes(`.${fMonth}`) || String(r.date).includes(`/${fMonth}`)));
            if (fDept) filtered = filtered.filter(r => r.dept === fDept);

            let csv = "Ad;Birim;Skor;Tarih\n";
            filtered.forEach(r => { csv += `${r.name};${r.dept};${r.score};${r.date || '-'}\n`; });
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob); link.download = "oyak_rapor.csv"; link.click();
        }

        function clearAllData() { 
            alert("Merkezi veritabanı silme işlemi güvenlik sebebiyle yalnızca Google Sheets üzerinden manuel yapılabilir."); 
        }
        
        function appReset() { showScreen('screen-login'); }
    </script>
</body>
</html>
